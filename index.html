<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Google – Sign in</title>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --page-bg: #1f2025;
      --card-bg: #000;
      --text: #e8eaed;
      --muted: #bdc1c6;
      --muted-2: #9aa0a6;
      --border: #5f6368;
      --link: #a8c7fa;
      --btn-bg: #a8c7fa;
      --btn-text: #062e6f;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background: var(--page-bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 22px;
    }

    .layout {
      width: 100%;
      max-width: 1320px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .card {
      border-radius: 42px;
      background: var(--card-bg);
      width: 100%;
      min-height: 600px;
      padding: 56px 60px;
      overflow: hidden;
    }

    /* screens */
    #screen-email  { display: block; }
    #screen-password { display: none; }

    .email-layout {
      display: grid;
      grid-template-columns: minmax(280px, 1fr) minmax(340px, 1fr);
      gap: 72px;
    }

    .logo-img {
      width: 44px;
      height: 44px;
      margin-bottom: 36px;
    }

    h1 {
      font-family: 'Google Sans', 'Roboto', sans-serif;
      font-size: clamp(40px, 3.8vw, 64px);
      font-weight: 400;
      line-height: 1.1;
      margin-bottom: 22px;
      color: var(--text);
    }

    .subtitle {
      max-width: 540px;
      font-size: clamp(22px, 2vw, 42px);
      line-height: 1.32;
      color: var(--muted);
    }

    .right-col {
      display: flex;
      flex-direction: column;
      padding-top: 120px;
      min-height: 460px;
    }

    .input-group {
      position: relative;
      margin-bottom: 22px;
      text-align: left;
    }

    .input-group input {
      width: 100%;
      height: 76px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 26px 20px 0;
      font-size: 42px;
      line-height: 1;
      font-family: 'Roboto', sans-serif;
      color: var(--text);
      background: transparent;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-group input:focus { border-color: var(--link); border-width: 2px; }

    .input-group input:focus + label,
    .input-group input:not(:placeholder-shown) + label {
      top: 10px;
      font-size: 13px;
      color: var(--link);
    }

    .input-group label {
      position: absolute;
      left: 16px;
      top: 24px;
      font-size: 44px;
      line-height: 1;
      color: var(--muted);
      pointer-events: none;
      transition: all 0.15s ease;
      background: var(--card-bg);
      padding: 0 6px;
    }

    .forgot,
    .info-text,
    .buttons {
      font-size: 43px;
      transform-origin: top left;
      transform: scale(0.33);
      width: 303%;
    }

    .forgot {
      margin-bottom: 42px;
    }

    .forgot a,
    .info-text a,
    .btn-create {
      font-family: 'Google Sans', sans-serif;
      color: var(--link);
      text-decoration: none;
      font-weight: 500;
    }

    .forgot a:hover,
    .info-text a:hover,
    .btn-create:hover,
    .footer-links a:hover { text-decoration: underline; }

    .info-text {
      color: var(--muted);
      line-height: 1.35;
      margin-bottom: 66px;
      max-width: 95%;
    }

    .buttons {
      margin-top: auto;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 42px;
    }

    .btn-create {
      background: none;
      border: none;
      cursor: pointer;
      padding: 10px 0;
    }

    .btn-next {
      font-family: 'Google Sans', sans-serif;
      font-size: 42px;
      line-height: 1;
      font-weight: 500;
      color: var(--btn-text);
      background: var(--btn-bg);
      border: none;
      border-radius: 999px;
      padding: 15px 38px;
      cursor: pointer;
      transition: filter 0.2s;
    }

    .btn-next:hover { filter: brightness(1.08); }

    /* password screen */
    .password-wrap {
      max-width: 520px;
      margin: 0 auto;
      padding-top: 36px;
    }

    .password-wrap h1 {
      font-size: 46px;
      margin-bottom: 22px;
    }

    .email-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 14px 8px 8px;
      margin-bottom: 28px;
      width: fit-content;
      cursor: pointer;
      transition: background 0.15s;
    }

    .email-chip:hover { background: #161616; }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #8ab4f8;
      color: #0b2660;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Google Sans', sans-serif;
    }

    .chip-email { font-size: 14px; color: var(--text); }
    .chip-arrow { width: 18px; height: 18px; color: var(--muted-2); }

    .pw-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      text-align: left;
      margin-top: -8px;
      margin-bottom: 24px;
      color: var(--muted);
    }

    .pw-toggle input[type=checkbox] { cursor: pointer; }

    /* footer */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 14px;
      padding: 0 26px;
    }

    .lang-select {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 36px;
      line-height: 1;
      transform: scale(0.33);
      transform-origin: left center;
      color: var(--muted);
      border: none;
      background: none;
      font-family: 'Roboto', sans-serif;
      margin-right: auto;
    }

    .footer-links {
      display: flex;
      align-items: center;
      gap: 38px;
      font-size: 36px;
      line-height: 1;
      transform: scale(0.33);
      transform-origin: right center;
      color: var(--muted);
    }

    .footer-links a {
      color: var(--muted);
      text-decoration: none;
      font-family: 'Google Sans', sans-serif;
    }

    /* slide animations */
    .slide-out-left { animation: slideOutLeft 0.25s ease forwards; }
    .slide-in-right  { animation: slideInRight 0.25s ease forwards; }

    @keyframes slideOutLeft {
      from { opacity:1; transform:translateX(0); }
      to   { opacity:0; transform:translateX(-30px); }
    }

    @keyframes slideInRight {
      from { opacity:0; transform:translateX(30px); }
      to   { opacity:1; transform:translateX(0); }
    }

    @media (max-width: 980px) {
      body { padding: 16px; }
      .card { border-radius: 26px; padding: 24px 20px 30px; min-height: auto; }
      .email-layout { grid-template-columns: 1fr; gap: 16px; }
      h1 { font-size: 36px; margin-bottom: 10px; }
      .subtitle { font-size: 20px; margin-bottom: 12px; }
      .right-col { padding-top: 0; min-height: auto; }
      .input-group input { height: 56px; font-size: 16px; padding: 16px 16px 0; }
      .input-group label { top: 18px; font-size: 16px; }
      .forgot, .info-text, .buttons { transform: none; width: 100%; font-size: 14px; }
      .buttons { margin-top: 8px; gap: 16px; }
      .btn-next { font-size: 14px; padding: 10px 24px; border-radius: 30px; }
      .lang-select, .footer-links { transform: none; font-size: 14px; }
      .footer-links { gap: 18px; }
      footer { padding: 0; }
      .logo-img { margin-bottom: 16px; }
      .password-wrap h1 { font-size: 32px; }
    }
  </style>
</head>
<body>

  <header>
    <a class="header-logo" href="#" aria-label="Google home">
      <img class="logo-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTjE3IbOFclX4cyMokQsgu7hDSn6iAHG83ZTw&s" alt="Google Logo" />
    </a>
  </header>

  <main>
    <div class="card">

      <img class="card-logo-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTjE3IbOFclX4cyMokQsgu7hDSn6iAHG83ZTw&s" alt="Google Logo" />

      <!-- ── SCREEN 1: EMAIL ── -->
      <div id="screen-email">
        <h1>Sign in</h1>
        <p class="subtitle">to continue to Google</p>

        <div class="input-group">
          <input type="email" id="email" placeholder=" " autocomplete="off" />
          <label for="email">Email or phone</label>
        </div>

        <div class="forgot">
          <a href="https://accounts.google.com/signin/usernamerecovery" target="_blank" rel="noopener noreferrer">Forgot email?</a>
        </div>

        <p class="info-text">
          Not your computer? Use a Guest mode to sign in privately.
          <a href="https://support.google.com/chrome/answer/6130773" target="_blank" rel="noopener noreferrer">Learn more about using Guest mode</a>
        </p>

        <div class="buttons">
          <a href="https://accounts.google.com/signup" class="btn-create" target="_blank" rel="noopener noreferrer">Create account</a>
          <button class="btn-next" id="btn-next-email">Next</button>
        </div>
      </div>

      <!-- ── SCREEN 2: PASSWORD ── -->
      <div id="screen-password">
        <h1>Welcome</h1>

        <div class="email-chip" id="email-chip">
          <div class="avatar" id="chip-avatar">?</div>
          <span class="chip-email" id="chip-email-text">user</span>
          <svg class="chip-arrow" viewBox="0 0 24 24" fill="currentColor">
            <path d="M7 10l5 5 5-5z"/>
          </svg>
        </div>

        <div class="input-group">
          <input type="password" id="password" placeholder=" " autocomplete="off" />
          <label for="password">Enter your password</label>
        </div>

        <div class="pw-toggle">
          <input type="checkbox" id="show-pw" onchange="togglePw()" />
          <label for="show-pw">Show password</label>
        </div>

        <div class="forgot">
          <a href="https://accounts.google.com/signin/v2/usernamerecovery" target="_blank" rel="noopener noreferrer">Forgot password?</a>
        </div>

        <div class="buttons">
          <div></div>
          <button class="btn-next" id="btn-next-password">Next</button>
        </div>
      </div>

      <div class="divider"></div>
      <div class="card-footer">
        <button class="lang-select">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
          </svg>
          English (United States)
        </button>
        <div class="footer-links">
          <a href="https://support.google.com/accounts" target="_blank" rel="noopener noreferrer">Help</a>
          <a href="https://policies.google.com/privacy" target="_blank" rel="noopener noreferrer">Privacy</a>
          <a href="https://policies.google.com/terms" target="_blank" rel="noopener noreferrer">Terms</a>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <span>English (United States)</span>
    <nav class="footer-nav">
      <a href="https://support.google.com/accounts" target="_blank" rel="noopener noreferrer">Help</a>
      <a href="https://policies.google.com/privacy" target="_blank" rel="noopener noreferrer">Privacy</a>
      <a href="https://policies.google.com/terms" target="_blank" rel="noopener noreferrer">Terms</a>
    </nav>
  </footer>

  <script>
    const emailScreen = document.getElementById('screen-email');
    const passwordScreen = document.getElementById('screen-password');
    const emailInput = document.getElementById('email');

    document.getElementById('btn-next-email').addEventListener('click', goToPassword);
    emailInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') goToPassword(); });

    function getChipDisplayName(identifier) {
      const clean = identifier.trim();
      if (!clean) return 'user';
      if (clean.includes('@')) {
        const [localPart] = clean.split('@');
        return localPart || clean;
      }
      return clean;
    }



    function getChipDisplayName(identifier) {
      const clean = identifier.trim();
      if (!clean) return 'user';
      if (clean.includes('@')) {
        const [localPart] = clean.split('@');
        return localPart || clean;
      }
      return clean;
    }
    function goToPassword() {
      const val = emailInput.value.trim() || 'user@gmail.com';
      const chipDisplay = getChipDisplayName(val);
      document.getElementById('chip-email-text').textContent = chipDisplay;
      document.getElementById('chip-avatar').textContent = chipDisplay.charAt(0).toUpperCase();

      emailScreen.classList.add('slide-out-left');
      setTimeout(() => {
        emailScreen.style.display = 'none';
        emailScreen.classList.remove('slide-out-left');
        passwordScreen.style.display = 'block';
        passwordScreen.classList.add('slide-in-right');
        setTimeout(() => passwordScreen.classList.remove('slide-in-right'), 300);
        document.getElementById('password').focus();
      }, 250);
    }

    document.getElementById('btn-next-password').addEventListener('click', doRedirect);
    document.getElementById('password').addEventListener('keydown', (e) => { if (e.key === 'Enter') doRedirect(); });

    function doRedirect() {
      window.location.href = 'https://www.google.com/?igu=1';
    }

    document.getElementById('email-chip').addEventListener('click', () => {
      passwordScreen.classList.add('slide-out-left');
      setTimeout(() => {
        passwordScreen.style.display = 'none';
        passwordScreen.classList.remove('slide-out-left');
        emailScreen.style.display = 'block';
        emailScreen.classList.add('slide-in-right');
        setTimeout(() => emailScreen.classList.remove('slide-in-right'), 300);
        emailInput.focus();
      }, 250);
    });

    function togglePw() {
      const pw = document.getElementById('password');
      pw.type = document.getElementById('show-pw').checked ? 'text' : 'password';
    }
  </script>
</body>
</html>
